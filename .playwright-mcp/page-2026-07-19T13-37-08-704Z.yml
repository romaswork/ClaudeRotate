  - generic [ref=e52]:
    - text: What is FreeModel
    - heading "A multi-model gateway, delivered as one API." [level=2] [ref=e53]
    - paragraph [ref=e54]: Instead of committing to a single vendor, FreeModel sits in front of a pool of the strongest open models and routes every request to the one most likely to nail it. You call one endpoint — in either the OpenAI or the Anthropic format — and we handle model selection, switching, and fallback underneath.
    - img "FreeModel routes each request across a pool of open models — DeepSeek, GLM, Qwen, MiniMax, Kimi, Llama — and can recursively call itself." [ref=e55]:
