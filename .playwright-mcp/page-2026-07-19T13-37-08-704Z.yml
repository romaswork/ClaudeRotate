      - heading "Questions, answered." [level=2] [ref=e192]
    - generic [ref=e193]:
      - generic [ref=e194]:
        - heading "Which API formats are supported?" [level=3] [ref=e195]
        - paragraph [ref=e196]: Both. FreeModel speaks the OpenAI format (v1/responses and v1/chat/completions) and the Anthropic format (v1/messages). Keep your existing SDK — change only the base URL and key.
      - generic [ref=e197]:
        - heading "Which models does it route across?" [level=3] [ref=e198]
        - paragraph [ref=e199]: A curated pool of the strongest open models. FreeModel picks the best fit per task, and the pool expands as new open models land.
      - generic [ref=e200]:
        - heading "How does routing work?" [level=3] [ref=e201]
        - paragraph [ref=e202]: Call a specific model, or let FreeModel pick the best fit for the task. If a model is throttled or down, requests fall back automatically.
      - generic [ref=e203]:
        - heading "Do I need a credit card to start?" [level=3] [ref=e204]
        - paragraph [ref=e205]: No. Verify your account and you get free API credits to start building immediately.
      - generic [ref=e206]:
        - heading "Can I exclude certain providers?" [level=3] [ref=e207]
        - paragraph [ref=e208]: Yes. Pin or exclude specific providers and models at any time, for compliance or preference.
